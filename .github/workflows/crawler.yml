name: Get Hot News

on:
  schedule:
    # 定时任务：北京时间每天清晨 07:33 全自动唤醒运行（UTC 时间 23:33）
    - cron: "33 23 * * *"

  workflow_dispatch: # 允许您在网页端随时手动点击按钮测试

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write    # 提升至写权限，确保生成的 index.html 能无缝提交到 Pages 节点
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Bypass Expiration Check
        run: |
          echo "✅ 永久使用版本已激活，免签到机制启动。"
          echo "✅ Self-hosted Mode: Expiration check bypassed."

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: success()
        uses: actions/setup-python@v6 # 维持底层标准打包环境

      - name: Install dependencies
        if: success()
        run: pip install requests feedparser pyyaml litellm

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        if: success()
        env:
          # 核心大图景：在这一步，把 GitHub Settings 里的钥匙死死塞进原项目指定的系统变量中
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: "openai/Qwen/Qwen2.5-72B-Instruct"
          AI_API_BASE: "https://api.siliconflow.cn/v1"
          GITHUB_ACTIONS: true
        run: python -m trendradar
