name: Get Hot News

on:
  schedule:
    - cron: "33 23 * * *"

  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write    
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Bypass Expiration Check
        run: |
          echo "✅ 永久使用版本已激活，免签到机制启动。"

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: success()
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        if: success()
        run: uv sync --frozen --no-dev

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        if: success()
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: "openai/deepseek-ai/DeepSeek-V3" 
          AI_API_BASE: "https://api.siliconflow.cn/v1"
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar 

      - name: Commit and Push changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Auto update trendradar HTML" || echo "No changes to commit"
          git push
