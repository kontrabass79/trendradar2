# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 时间线配置
#                       Version: 1.2.0 (自媒体二开全量版)
# ═══════════════════════════════════════════════════════════════

# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/

# ───────────────────────────────────────────────────────────────
# 预设模板一览 (在 config.yaml 的 schedule.preset 中指定自定义 custom 模式)
# ───────────────────────────────────────────────────────────────
presets:
  # 统一退回到极简结构，将所有控制权转交底部的 custom 自定义引擎，避免规则冲突
  always_on:
    name: "全天监控"
    description: "自媒体模式下不推荐使用此预设。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: true
      report_mode: "incremental"
      once:
        analyze: false
        push: false
    periods: {}
    day_plans:
      all_day:
        periods: []
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

# ═══════════════════════════════════════════════════════════════
# 5️⃣ 垂直自媒体爆款生产线 - 自定义模式
# ═══════════════════════════════════════════════════════════════
custom:
  name: "自媒体爆款全自动生产线"
  description: "专门为清晨自动洗稿、产出3篇羊皮纸博客而定制的24小时时间流控制体系。"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 默认配置（其余处于静默积累数据的时段：只采集、不分析、不打扰推送）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  default:
    collect: true                  # 静默期坚持采集 40+ 个 RSS，为后续大模型洗稿积累足够丰富的轨迹和信号
    analyze: false                 # 平时绝不盲目调用 AI，严防超额消耗您的硅基流动免费 Token
    ai_mode: "current"
    push: false                    # 平时处于静默状态，绝不发送半成品通知
    report_mode: "current"
    once:
      analyze: true                # 每个生效时间段内严格限制只执行一次
      push: true                   # 每个生效时间段内严格限制只推送一次

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 第 1 步：定义积木块（精准卡死每天早上 07:30 上线）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  periods:

    # 深夜不间断情报网（深夜 22:00 至 次日清晨 06:00 跨日沉淀数据）
    night_osint:
      name: "深夜数据沉淀"
      start: "22:00"
      end: "06:00"
      collect: true
      analyze: false
      push: false

    # 核心二开阵地：清晨爆款产线（早上 07:00 至 09:00 窗口开放）
    # 当 GitHub Actions 在 07:30 定时唤醒系统时，将完美命中本时段规则！
    morning_publisher:
      name: "清晨自媒体全量洗稿"
      start: "07:00"
      end: "09:00"
      collect: true                 # 顺便补抓清晨最新突发资讯
      analyze: true                 # 准许调用 AI 分析引擎！
      ai_mode: "daily"              # 强制 AI 进行全天及昨夜的深度全量内容大融合汇总
      push: true                    # 准许激活 Webhook/邮件通知通道，直接引爆推送！
      report_mode: "daily"          # 报告模式切换为当日（含昨日深夜）全量 RSS 新闻打包大汇总
      # 继承默认的 once 属性（analyze: true, push: true），确保每天清晨在 07-09 点之间只生成发布一次！

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 第 2 步：把积木块拼成日计划
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  day_plans:
    # 无论是工作日还是周末，网赚与科技资讯都不能停，采用全天候统一产线日程
    blogger_day:
      periods: ["night_osint", "morning_publisher"]

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 第 3 步：指定周一到周日每天使用的日计划
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  week_map:
    1: "blogger_day"               # 周一
    2: "blogger_day"               # 周二
    3: "blogger_day"               # 周三
    4: "blogger_day"               # 周四
    5: "blogger_day"               # 周五
    6: "blogger_day"               # 周六
    7: "blogger_day"               # 周日

  overlap:
    policy: "error_on_overlap"     # 严防时间段重叠造成逻辑冲突
