# ===============================================================
# 4. 报告模式 & 5. 推送内容控制
# ===============================================================
report:
  mode: "daily"                       # 每日汇总模式
  display_mode: "platform"            # 按来源进行基础聚合
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "ai"                        # 强制开启 AI 智能初筛，让机器人去读取你的 ai_interests.txt
  priority_sort_enabled: true         # 严格按照定义的 1、2、3 顺序进行排序

ai_filter:
  batch_size: 200                     # 每批次发送给 AI 的标题上限
  batch_interval: 2                   # 避免限流的等待间隔
  min_score: 0.5                      # 适当放宽初筛标准，留足素材给后续爆款洗稿

display:
  region_order:
    - ai_analysis                     # 将 AI 分析出来的羊皮纸博客排在最前面
    - rss
  regions:
    hotlist: false
    new_items: false
    rss: true                         # 显示并分析 RSS
    standalone: false
    ai_analysis: true                 # 显示 AI 博客内容

# ===============================================================
# 6. 推送通知 (直接打通 Notion Email 收件箱，实现零费用发布)
# ===============================================================
# ===============================================================
# 6. 推送通知 (有网页部署，直接关闭通知，零成本无打扰)
# ===============================================================
notification:
  enabled: false                      # 直接关闭邮件通道，依靠网页自动更新
# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "local"                    # 本地流，完全不需要买云存储服务器
  formats:
    sqlite: true
    txt: false
    html: true                        # 邮件和页面生成需要 HTML 支持

# ===============================================================
# 8. AI 模型配置 (利用内置 LiteLLM 框架，完美兼容硅基流动免费节点)
# ===============================================================
ai:
  model: "openai/Qwen/Qwen2.5-72B-Instruct" # 强制指定硅基流动的大型开源爆款创作模型
  api_key: ""                         # 留空，我们在 GitHub Secrets 中配置统一的变量 AI_API_KEY
  api_base: "https://api.siliconflow.cn/v1" # 硅基流动端点
  timeout: 120
  temperature: 1.0                    # 头条风需要高发散度、高爆款度
  max_tokens: 5000

# ===============================================================
# 9. AI 分析与博客生成参数
# ===============================================================
ai_analysis:
  enabled: true                       # 开启 AI 核心功能
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt" # 联动下方的提示词模板
  mode: "daily"
  max_news_for_analysis: 250          # 扩大配额，吃下 40 个源的标题
  include_rss: true                   # 必须改成 true！让 AI 深度清洗 RSS 数据
  include_standalone: false
  include_rank_timeline: false

advanced:
  debug: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
