report:
  mode: "daily"                       
  display_mode: "platform"            

filter:
  method: "ai"                        # 【核心控制】开启第一阶段 AI 智能过滤
  priority_sort_enabled: true         

ai_filter:
  batch_size: 200                     
  batch_interval: 2                   
  min_score: 0.5                      # 分数低于 0.5 的杂质新闻直接过滤掉

display:
  region_order:
    - ai_analysis                     # 强行让大模型洗出的 3 篇复古羊皮纸博客排在最顶部
    - rss                             # 原始 RSS 数据排在下面作为底稿参考
  regions:
    hotlist: false
    new_items: false
    rss: true                         
    standalone: false
    ai_analysis: true                 

notification:
  enabled: false                      # 彻底关闭推送渠道，只在网页端展示，防骚扰且省钱

storage:
  backend: "local"                    
  formats:
    sqlite: true
    txt: false
    html: true                        # 保持输出 HTML 网页，供给 GitHub Pages 承接

ai:
  # ══════════════ 硅基流动安全接入层 ══════════════
  model: "openai/Qwen/Qwen2.5-72B-Instruct" 
  api_key: ""                         # 留空，通过密钥层加密注入
  api_base: "https://api.siliconflow.cn/v1" 
  timeout: 120
  temperature: 1.0                    
  max_tokens: 5000

ai_analysis:
  enabled: true                       # 【核心】开启第二阶段爆款生成器
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt" # 绑定你的头条双标题文案灵魂提示词
  mode: "daily"
  max_news_for_analysis: 250          
  include_rss: true                   # 必须设为 true，让 AI 全力提取分析你上述的 40+ 个 RSS 流数据
  include_standalone: false
  include_rank_timeline: false

advanced:
  debug: false
