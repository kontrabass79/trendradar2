# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"           # 北京时间 UTC+8
  show_version_update: false          # 关闭版本提示

schedule:
  enabled: true                       # 【如果想用内置时间线，可将其设为 true】
  preset: "custom"                    # 【强制指定】告诉机器人去执行上面为您改好的自媒体爆款生产线日程

# ===============================================================
# 2. 数据源 - 热榜平台 (关闭国内热榜，专注您的技术和网赚流)
# ===============================================================
platforms:
  enabled: false                      # 关闭国内热榜抓取
  sources:
    - id: "toutiao"
      name: "今日头条"

