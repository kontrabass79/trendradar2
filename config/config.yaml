app:
  timezone: "Asia/Shanghai"           # 强制采用北京时间执行
  show_version_update: false

schedule:
  enabled: false                      # 关闭原项目的自动化调度，改由 GitHub Actions 强行控制

platforms:
  enabled: false                      # 彻底关闭国内热榜（微博/知乎等），精简算力聚焦 RSS 独立搞钱流

rss:
  enabled: true                       # 【开启】RSS 核心数据抓取
  freshness_filter:
    enabled: true                     
    max_age_days: 1                   # 严格限制：只抓取过去 24 小时内的最新资讯

